  <h1>PWA Probe → Macro</h1>
  <div id="log">Avvio...</div>

  <script>
    var BRIDGE_WIDGET = 'pwa-probe-inbox';
    var MAX_LEN = 240;
    var logEl = document.getElementById('log');
    var lines = [];

    function uiLog(text, cls) {
      lines.push(text);
      logEl.textContent = lines.join('\n');
      logEl.className = cls || '';
    }

    function parseQuery() {
      var out = {};
      var q = location.search.replace(/^\?/, '');
      if (!q) return out;
      var pairs = q.split('&');
      for (var i = 0; i < pairs.length; i++) {
        var p = pairs[i].split('=');
        var k = decodeURIComponent(p[0] || '');
        var v = decodeURIComponent((p[1] || '').replace(/\+/g, ' '));
        out[k] = v;
      }
      return out;
    }

    function safeStringify(v) {
      try {
        if (typeof v === 'function') return '[function]';
        if (v === null || v === undefined) return String(v);
        if (typeof v === 'object') return JSON.stringify(v);
        return String(v);
      } catch (e) {
        return '[unserializable]';
      }
    }

    function truncate(s) {
      s = String(s);
      return s.length > MAX_LEN ? s.substring(0, MAX_LEN) + '…' : s;
    }

    async function sendToMacro(xapi, key, value) {
      var msg = 'PWA|' + key + '|' + truncate(value);
      uiLog('→ macro: ' + msg);
      await xapi.Command('UserInterface Extensions Widget SetValue', {
        WidgetId: BRIDGE_WIDGET,
        Value: msg,
      });
      await delay(120);
    }

    function delay(ms) {
      return new Promise(function (r) { setTimeout(r, ms); });
    }

    async function collectVariables() {
      var vars = [];

      vars.push(['location.href', location.href]);
      vars.push(['location.origin', location.origin]);
      vars.push(['location.pathname', location.pathname]);
      vars.push(['location.search', location.search]);
      vars.push(['location.hash', location.hash]);
      vars.push(['document.referrer', document.referrer || '']);
      vars.push(['navigator.userAgent', navigator.userAgent]);
      vars.push(['navigator.language', navigator.language]);

      var qp = parseQuery();
      for (var qk in qp) {
        if (Object.prototype.hasOwnProperty.call(qp, qk)) {
          vars.push(['query.' + qk, qp[qk]]);
        }
      }

      vars.push(['window.getXAPI', typeof window.getXAPI]);
      vars.push(['window.xapi', typeof window.xapi]);

      var winKeys = Object.getOwnPropertyNames(window).sort();
      for (var i = 0; i < winKeys.length; i++) {
        var k = winKeys[i];
        if (/xapi|webex|cisco|ce|jsx|macro|bridge/i.test(k)) {
          vars.push(['window.' + k, typeof window[k]]);
        }
      }

      return vars;
    }
